<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OKF Graph - docs</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      color: #333;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #1a1a1a; color: #e0e0e0; }
      #info { background: #2a2a2a; border-color: #444; }
      #legend { background: #2a2a2a; border-color: #444; }
    }
    .container {
      display: flex;
      height: 100vh;
    }
    #canvas {
      flex: 1;
      background: #ffffff;
      cursor: grab;
    }
    @media (prefers-color-scheme: dark) {
      #canvas { background: #222; }
    }
    #sidebar {
      width: 280px;
      overflow-y: auto;
      background: #fafafa;
      border-left: 1px solid #ddd;
      display: flex;
      flex-direction: column;
    }
    @media (prefers-color-scheme: dark) {
      #sidebar { background: #1a1a1a; border-color: #444; }
    }
    #info {
      padding: 16px;
      background: #f0f0f0;
      border-bottom: 1px solid #ddd;
      flex-shrink: 0;
    }
    @media (prefers-color-scheme: dark) {
      #info { background: #2a2a2a; border-color: #444; }
    }
    #info h2 { font-size: 14px; margin-bottom: 8px; }
    #info p { font-size: 12px; line-height: 1.4; }
    #legend {
      padding: 16px;
      background: #f0f0f0;
      border-bottom: 1px solid #ddd;
      font-size: 12px;
      max-height: 200px;
      overflow-y: auto;
      flex-shrink: 0;
    }
    @media (prefers-color-scheme: dark) {
      #legend { background: #2a2a2a; border-color: #444; }
    }
    .legend-item {
      display: flex;
      align-items: center;
      margin-bottom: 6px;
    }
    .legend-color {
      width: 12px;
      height: 12px;
      border-radius: 2px;
      margin-right: 8px;
      flex-shrink: 0;
    }
    .empty { text-align: center; padding: 20px; color: #999; }
  </style>
</head>
<body>
  <div class="container">
    <canvas id="canvas"></canvas>
    <div id="sidebar">
      <div id="legend">
        <strong>Types:</strong>
      </div>
      <div id="info">
        <p class="empty">Click or hover a node</p>
      </div>
    </div>
  </div>

  <script>
    // Embedded data
    const DATA = {
      nodes: [{"id":"authoring-skills.md","label":"Authoring keel skills","type":"reference","description":"Guide for writing skills in keel following TDD methodology, including when to create a skill, SKILL.md structure, and how to wire new skills into the keel framework"},{"id":"design-notes/concepts-layer.md","label":"Agnostic concept layer","type":"design-note","description":"How the concept layer standardizes engineering principles (Clean Architecture, SOLID, etc.) agnostically across languages using skills, constitution rules, and structure templates"},{"id":"design-notes/execution-mode-routing.md","label":"Execution mode routing","type":"design-note","description":"Why implement-and-evaluate picks inline vs dispatch vs dispatch-parallel execution modes based on task count and coupling, with parallelization via scope declaration and worktree isolation"},{"id":"design-notes/gates-vs-skills.md","label":"Gate vs skill","type":"design-note","description":"Decision rule for splitting review concerns: mechanical/deterministic rules belong in gates, judgment-based concerns in skills"},{"id":"design-notes/knowledge-packs-roadmap.md","label":"Knowledge-packs roadmap","type":"design-note","description":"Roadmap for adding knowledge packs that inject stack/domain expertise during plan and implement phases, including stack-conventions, codebase-map, saas-security, pattern replication, and data-layer contracts"},{"id":"design-notes/ship-pack-scoping.md","label":"Ship-pack scoping","type":"design-note","description":"Scope analysis for a ship pack covering post-integration lifecycle, including observability-and-instrumentation (included) and contract-deprecation (deferred)"},{"id":"plans/2026-06-17-keel-core.md","label":"Keel Core Scaffolder","type":"plan","description":"Implementation plan for keel's stack-agnostic core including bootstrap script, templates, generic gates, 4 active hooks, document phase skills, implementation phase skills, and TS pack dispatch"},{"id":"plans/2026-06-22-agnostic-concept-layer.md","label":"Agnostic concept layer","type":"plan","description":"Design and implementation plan for a language-agnostic concept layer that standardizes engineering principles with skill guides, constitution rules, structure templates, and language-specific packs"},{"id":"plans/2026-06-22-multi-client-views.md","label":"Multi-client views","type":"plan","description":"Plan for generating derived views from canonical keel content for other AI agents (Codex, Cursor, Copilot, Gemini, Windsurf) while maintaining advisory-only enforcement without mechanical hooks"},{"id":"specs/2026-06-17-keel-design.md","label":"Keel design","type":"spec","description":"Design spec for keel: a spec-driven development scaffolder that installs SDD flow (agnostic core + stack packs) with active enforcement via hooks, templates, skills, and gates"}],
      edges: [],
      typeToColor: {"design-note":"#FF6B6B","plan":"#4ECDC4","reference":"#45B7D1","spec":"#FFA07A"},
    };

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const infoPane = document.getElementById('info');
    const legend = document.getElementById('legend');

    // Set canvas size
    function resizeCanvas() {
      canvas.width = canvas.offsetWidth;
      canvas.height = canvas.offsetHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    // Simple physics simulation
    const sim = {
      nodes: DATA.nodes.map(n => ({
        ...n,
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        vx: 0,
        vy: 0,
      })),
      edges: DATA.edges,
      friction: 0.99,
      repulsion: 100,
      springK: 0.1,
      springLen: 100,
    };

    let selectedNodeId = null;

    function step() {
      const nodes = sim.nodes;

      // Reset forces
      for (const n of nodes) { n.fx = 0; n.fy = 0; }

      // Repulsion between all nodes
      for (let i = 0; i < nodes.length; i++) {
        for (let j = i + 1; j < nodes.length; j++) {
          const a = nodes[i], b = nodes[j];
          const dx = b.x - a.x || 0.01;
          const dy = b.y - a.y || 0.01;
          const dist = Math.hypot(dx, dy);
          const force = sim.repulsion / (dist * dist + 1);
          const fx = (dx / dist) * force;
          const fy = (dy / dist) * force;
          a.fx -= fx; a.fy -= fy;
          b.fx += fx; b.fy += fy;
        }
      }

      // Springs on edges
      for (const edge of sim.edges) {
        const a = nodes.find(n => n.id === edge.source);
        const b = nodes.find(n => n.id === edge.target);
        if (!a || !b) continue;
        const dx = b.x - a.x;
        const dy = b.y - a.y;
        const dist = Math.hypot(dx, dy);
        const spring = sim.springK * (dist - sim.springLen);
        const fx = (dx / (dist + 0.01)) * spring;
        const fy = (dy / (dist + 0.01)) * spring;
        a.fx += fx; a.fy += fy;
        b.fx -= fx; b.fy -= fy;
      }

      // Light centering
      const cx = canvas.width / 2;
      const cy = canvas.height / 2;
      for (const n of nodes) {
        n.fx -= (n.x - cx) * 0.01;
        n.fy -= (n.y - cy) * 0.01;
      }

      // Integrate
      for (const n of nodes) {
        n.vx = (n.vx + n.fx) * sim.friction;
        n.vy = (n.vy + n.fy) * sim.friction;
        n.x += n.vx;
        n.y += n.vy;

        // Bounds
        n.x = Math.max(20, Math.min(canvas.width - 20, n.x));
        n.y = Math.max(20, Math.min(canvas.height - 20, n.y));
      }
    }

    function render() {
      ctx.fillStyle = getComputedStyle(canvas).backgroundColor;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Draw edges
      ctx.strokeStyle = getComputedStyle(document.documentElement).color;
      ctx.globalAlpha = 0.2;
      ctx.lineWidth = 1;
      for (const edge of sim.edges) {
        const a = sim.nodes.find(n => n.id === edge.source);
        const b = sim.nodes.find(n => n.id === edge.target);
        if (!a || !b) continue;
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;

      // Draw nodes
      const nodeRadius = 8;
      for (const n of sim.nodes) {
        ctx.fillStyle = DATA.typeToColor[n.type] || '#999';
        ctx.beginPath();
        ctx.arc(n.x, n.y, nodeRadius, 0, Math.PI * 2);
        ctx.fill();

        if (n.id === selectedNodeId) {
          ctx.strokeStyle = '#333';
          ctx.lineWidth = 2;
          ctx.stroke();
        }
      }

      // Draw labels
      ctx.fillStyle = getComputedStyle(document.documentElement).color;
      ctx.font = '11px sans-serif';
      ctx.textAlign = 'left';
      for (const n of sim.nodes) {
        ctx.fillText(n.label, n.x + nodeRadius + 4, n.y + 3);
      }
    }

    function findNodeAt(x, y, radius = 12) {
      for (const n of sim.nodes) {
        const dx = n.x - x, dy = n.y - y;
        if (Math.hypot(dx, dy) <= radius) return n.id;
      }
      return null;
    }

    canvas.addEventListener('mousemove', (e) => {
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      const nodeId = findNodeAt(x, y);
      canvas.style.cursor = nodeId ? 'pointer' : 'grab';
    });

    canvas.addEventListener('click', (e) => {
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      const nodeId = findNodeAt(x, y);
      if (nodeId) {
        selectedNodeId = nodeId;
        const node = sim.nodes.find(n => n.id === nodeId);
        infoPane.innerHTML = `
          <h2>${node.label}</h2>
          <p><strong>Type:</strong> ${node.type}</p>
          <p><strong>ID:</strong> ${node.id}</p>
          ${node.description ? `<p><strong>Description:</strong></p><p>${node.description}</p>` : '<p class="empty">No description</p>'}
        `;
      }
    });

    // Build legend
    const typeList = Object.keys(DATA.typeToColor).sort();
    let legendHtml = '<strong>Types:</strong>';
    for (const type of typeList) {
      legendHtml += `
        <div class="legend-item">
          <div class="legend-color" style="background: ${DATA.typeToColor[type]}"></div>
          ${type}
        </div>
      `;
    }
    legend.innerHTML = legendHtml;

    // Animation loop
    setInterval(() => {
      step();
      render();
    }, 30);

    render();
  </script>
</body>
</html>
